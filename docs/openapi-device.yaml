openapi: 3.0.3
info:
  title: Device Service API
  description: |
    REST API для управления умными устройствами в экосистеме "Тёплый дом".
    Позволяет регистрировать устройства, управлять их статусом, получать данные и настраивать привязку к домам.
  version: 1.0.0
  contact:
    name: Архитектурная команда "Тёплый дом"
    email: arch@warmhouse.tech

servers:
  - url: http://localhost:8082
    description: Локальный сервер разработки
  - url: https://api.warmhouse.tech/v1
    description: Продакшн-сервер

tags:
  - name: Devices
    description: Операции с умными устройствами
  - name: Device Types
    description: Управление типами устройств (термостат, свет и т.д.)

paths:
  /api/devices:
    get:
      tags:
        - Devices
      summary: Получить список всех устройств
      description: Возвращает список всех зарегистрированных устройств. Можно фильтровать по статусу.
      parameters:
        - name: status
          in: query
          description: Фильтр по статусу (ONLINE, OFFLINE, MAINTENANCE)
          required: false
          schema:
            type: string
            enum: [ONLINE, OFFLINE, MAINTENANCE]
      responses:
        '200':
          description: Список устройств
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DeviceResponse'
        '500':
          description: Внутренняя ошибка сервера

    post:
      tags:
        - Devices
      summary: Зарегистрировать новое устройство
      description: Добавляет новое устройство в систему. Устройство должно иметь уникальный serialNumber.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceCreateRequest'
      responses:
        '201':
          description: Устройство успешно создано
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceResponse'
        '400':
          description: Некорректные данные
        '409':
          description: Устройство с таким serialNumber уже существует

  /api/devices/{id}:
    get:
      tags:
        - Devices
      summary: Получить устройство по ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Информация об устройстве
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceResponse'
        '404':
          description: Устройство не найдено

    put:
      tags:
        - Devices
      summary: Обновить устройство
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceUpdateRequest'
      responses:
        '200':
          description: Устройство обновлено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceResponse'
        '404':
          description: Устройство не найдено
        '400':
          description: Некорректные данные

    delete:
      tags:
        - Devices
      summary: Удалить устройство
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Устройство удалено
        '404':
          description: Устройство не найдено

  /api/devices/{id}/status:
    put:
      tags:
        - Devices
      summary: Изменить статус устройства
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [ONLINE, OFFLINE, MAINTENANCE]
                  example: ONLINE
              required:
                - status
      responses:
        '200':
          description: Статус обновлён
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceResponse'
        '400':
          description: Некорректный статус
        '404':
          description: Устройство не найдено

  /api/device-types:
    get:
      tags:
        - Device Types
      summary: Получить все типы устройств
      responses:
        '200':
          description: Список типов устройств
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DeviceType'

components:
  schemas:
    DeviceResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        serialNumber:
          type: string
          example: "SN-TH-1001-A"
        name:
          type: string
          example: "Термостат в гостиной"
        status:
          type: string
          enum: [ONLINE, OFFLINE, MAINTENANCE]
          example: ONLINE
        ipAddress:
          type: string
          format: ipv4
          example: "192.168.1.101"
        location:
          type: string
          example: "Гостиная"
        deviceType:
          $ref: '#/components/schemas/DeviceType'
        userId:
          type: string
          example: "user-123"
        connectedAt:
          type: string
          format: date-time
          example: "2025-04-05T10:00:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2025-04-05T12:30:00Z"
      required:
        - id
        - serialNumber
        - name
        - status
        - deviceType

    DeviceCreateRequest:
      type: object
      properties:
        serialNumber:
          type: string
          description: Уникальный серийный номер устройства
          example: "SN-LIGHT-2002-B"
        name:
          type: string
          description: Понятное пользователю имя
          example: "Свет на кухне"
        location:
          type: string
          example: "Кухня"
        deviceTypeId:
          type: integer
          format: int64
          example: 2
        userId:
          type: string
          example: "user-123"
      required:
        - serialNumber
        - name
        - deviceTypeId
        - userId

    DeviceUpdateRequest:
      type: object
      properties:
        name:
          type: string
          example: "Обновлённое имя"
        location:
          type: string
          example: "Спальня"
        deviceTypeId:
          type: integer
          format: int64
          example: 1

    DeviceType:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        typeName:
          type: string
          example: "THERMOSTAT"
        protocol:
          type: string
          enum: [MQTT, HTTP, COAP]
          example: MQTT
        description:
          type: string
          example: "Устройство управления отоплением"